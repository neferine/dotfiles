include=/home/pug/.cache/wal/colors-fuzzel.ini

[main]
font = Iosevka Nerd Font:size=12
dpi-aware=yes
icon-theme=Papirus-Dark
fields=filename,name,generic
terminal=kitty
layer=overlay
lines=15
width=40
horizontal-pad=20
vertical-pad=10
inner-pad=10

[border]
width=2
radius=12

[dmenu]
exit-immediately-if-empty=yes

# Include pywal colors

[colors]
background=36201bb0
[colors]
prompt=ccc7c6ff
text=ccc7c6ff
placeholder=ccc7c6ff
input=ccc7c6ff
match=ccc7c6ff
selection=737584ff
