include=/home/pug/.cache/wal/colors-fuzzel.ini

[main]
font = Iosevka Nerd Font:size=12
dpi-aware=yes
icon-theme=Papirus-Dark
fields=filename,name,generic
terminal=kitty
layer=overlay
lines=15
width=40
horizontal-pad=20
vertical-pad=10
inner-pad=10

[border]
width=2
radius=12

[dmenu]
exit-immediately-if-empty=yes

# Include pywal colors

[colors]
background=333f2db0
[colors]
prompt=cccfcaff
text=cccfcaff
placeholder=cccfcaff
input=cccfcaff
match=cccfcaff
selection=A4A5A3ff
selection-text=333f2dff
selection-match=cccfcaff
border=A4A5A3ff
